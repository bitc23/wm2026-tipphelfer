name: Resultat-Update

on:
  push:
    branches: [claude/auto-daily-results-updates-awx3la]   # TEMPORÄR: zum Teste uf dem Branch
  schedule:
    - cron: "0 7 * * *"    # täglich 07:00 UTC (09:00 CEST) — nach de Nacht-Spiel in Nordamerika
  workflow_dispatch:        # manuell uslösbar im Actions-Tab

permissions:
  contents: write

concurrency:
  group: results-update   # cron und manuelle Läuf nöd parallel laufe lah

jobs:
  update-results:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Live-Resultat hole und results.json schriibe
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node update-results.mjs
      - name: Commit & Push (nur wenn sich öppis ändert hät)
        run: |
          if git diff --quiet results.json; then
            echo "Kei Änderig — kei Commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add results.json
            git commit -m "chore: Resultat-Update $(date -u +%d.%m.%Y)"
            git pull --rebase origin main
            git push
          fi
