name: Resultat-Update

on:
  schedule:
    - cron: "0 4 * * *"    # 04:00 UTC geplant. GitHub-Scheduler lauft aber typisch 3-6h spöter,
                           # drum früeh aagsetzt, damit de verzögerti Lauf am spöte Morge (CEST) landet.
                           # Mues nach em Elo-Lauf (03:30 UTC) und nach de letschte Nacht-Spiel si.
  workflow_dispatch:        # manuell uslösbar im Actions-Tab

permissions:
  contents: write

concurrency:
  group: results-update   # cron und manuelle Läuf nöd parallel laufe lah

jobs:
  update-results:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Live-Resultat hole und results.json schriibe
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node update-results.mjs
      - name: Commit & Push (nur wenn sich öppis ändert hät)
        run: |
          if git diff --quiet results.json; then
            echo "Kei Änderig — kei Commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add results.json
            git commit -m "chore: Resultat-Update $(date -u +%d.%m.%Y)"
            git pull --rebase origin main
            git push
          fi
